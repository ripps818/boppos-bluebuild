# BoppOS Optimized Sysctl Overrides
# These are settings that are not expected to be managed by the tuned profile.

# Increase the maximum number of memory map areas a process can have.
# Required by many modern games and applications (e.g., via Wine/Proton).
vm.max_map_count = 2147483642

# Allow users to watch more files with inotify.
# Prevents errors in applications like VS Code, Steam, etc. on large projects/filesystems.
fs.inotify.max_user_watches = 524288

# Allow performance monitoring tools for non-root users (with some restrictions).
# Useful for debugging and profiling.
kernel.perf_event_paranoid = 1

# TCP Fast Open can speed up successive TCP connections.
net.ipv4.tcp_fastopen = 3
